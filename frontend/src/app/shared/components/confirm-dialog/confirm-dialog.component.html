<!-- src/app/shared/components/confirm-dialog/confirm-dialog.component.html -->
<div class="modal-overlay" (click)="cancelled.emit()">
  <div class="modal" (click)="$event.stopPropagation()" role="dialog" [attr.aria-label]="title">

    <div class="modal-header">
      <h3>{{ title }}</h3>
      <button class="btn-icon" (click)="cancelled.emit()" title="Close">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6"  y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="modal-body">
      <p class="confirm-message">{{ message }}</p>
    </div>

    <div class="modal-footer">
      <button class="btn btn-outline" (click)="cancelled.emit()" [disabled]="loading">
        {{ cancelLabel }}
      </button>
      <button
        class="btn"
        [class]="confirmClass"
        (click)="confirmed.emit()"
        [disabled]="loading"
      >
        @if (loading) {
          <span class="btn-spinner-dark"></span>
        }
        {{ confirmLabel }}
      </button>
    </div>

  </div>
</div>
