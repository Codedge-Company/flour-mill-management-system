<div class="modal-overlay" (click)="cancelled.emit()">
  <div class="modal" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h3>Add Stock — {{ item.packName }}</h3>
      <button class="btn-icon" (click)="cancelled.emit()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6"  y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="modal-body">

      <!-- Current info -->
      <div class="info-row">
        <div class="info-box">
          <span class="info-label">Current Stock</span>
          <span class="info-val">{{ item.stockQty }} packs</span>
        </div>
        <div class="info-arrow">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
               viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
        <div class="info-box highlight">
          <span class="info-label">New Total</span>
          <span class="info-val success">{{ newTotal }} packs</span>
        </div>
      </div>

      @if (error()) {
        <div class="dialog-error">{{ error() }}</div>
      }

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <div class="form-group">
          <label class="form-label" for="addQty">
            Quantity to Add <span>*</span>
          </label>
          <input
            id="addQty"
            type="number"
            class="form-control"
            [class.error]="f['addQty'].invalid && f['addQty'].touched"
            formControlName="addQty"
            placeholder="e.g. 100"
            min="1"
            step="1"
          />
          @if (f['addQty'].invalid && f['addQty'].touched) {
            <span class="form-error">Please enter a valid quantity (min 1)</span>
          }
        </div>

        <div class="modal-footer" style="padding: 0; margin-top: 24px;">
          <button type="button" class="btn btn-outline"
                  (click)="cancelled.emit()" [disabled]="loading()">
            Cancel
          </button>
          <button type="submit" class="btn btn-primary" [disabled]="loading()">
            @if (loading()) { <span class="btn-spinner"></span> }
            Add Stock
          </button>
        </div>
      </form>

    </div>
  </div>
</div>
