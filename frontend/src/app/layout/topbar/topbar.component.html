<!-- src/app/layout/topbar/topbar.component.html -->
<header class="topbar">

  <!-- Left: hamburger -->
  <button class="btn-icon" (click)="onToggleSidebar()" title="Toggle sidebar">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none"
         viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="6"  x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <!-- Page title slot -->
  <div class="topbar-title hide-mobile">
    Matheesha Flour Mill
  </div>

  <!-- Right actions -->
  <div class="topbar-actions">

    <!-- Notification bell -->
    <a [routerLink]="['/notifications']" class="bell-btn" title="Notifications">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none"
           viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      @if (notificationService.unreadCount() > 0) {
        <span class="bell-badge">
          {{ notificationService.unreadCount() > 99 ? '99+' : notificationService.unreadCount() }}
        </span>
      }
    </a>

    <!-- User menu -->
    <div class="user-menu-wrapper">
      <button class="user-menu-trigger" (click)="toggleUserMenu()">
        <div class="topbar-avatar">
          {{ authService.currentUser()?.fullName?.charAt(0)?.toUpperCase() }}
        </div>
        <span class="hide-mobile">{{ authService.currentUser()?.fullName }}</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>

      @if (showUserMenu()) {
        <div class="user-dropdown">
          <div class="dropdown-header">
            <p class="font-semibold">{{ authService.currentUser()?.fullName }}</p>
            <p class="text-sm text-secondary">{{ authService.currentUser()?.role }}</p>
          </div>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item danger" (click)="logout()">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Logout
          </button>
        </div>
      }
    </div>

  </div>
</header>
